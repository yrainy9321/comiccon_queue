              avgIntervalElement.textContent = `${minutes}分${seconds > 0 ? seconds + '秒' : ''}`;
            } else {
              avgIntervalElement.textContent = `${seconds}秒`;
            }
          } else {
            avgIntervalElement.textContent = '-';
          }
          
          const isPaused = activity && activity.queuePaused;
          
          const callNumberInput = document.getElementById('call-number');
          const callManualBtn = document.getElementById('call-manual-btn');
          const batchCallCountInput = document.getElementById('batch-call-count');
          const batchCallBtn = document.getElementById('batch-call-btn');
          
          if (isPaused) {
            queueStatusElement.textContent = '排队暂停';
            queueStatusElement.style.color = '#faad14';
            pauseBtn.textContent = '继续排队';
            pauseBtn.className = 'btn btn-success';
            callNumberInput.disabled = true;
            callManualBtn.disabled = true;
            callNumberInput.style.opacity = '0.5';
            callManualBtn.style.opacity = '0.5';
            if (batchCallCountInput) {
              batchCallCountInput.disabled = true;
              batchCallCountInput.style.opacity = '0.5';
            }
            if (batchCallBtn) {
              batchCallBtn.disabled = true;
              batchCallBtn.style.opacity = '0.5';
            }
          } else if (status.isSlow) {
            queueStatusElement.textContent = '排队缓慢';
            queueStatusElement.style.color = '#f5222d';
            pauseBtn.textContent = '暂停排队';
            pauseBtn.className = 'btn btn-warning';
            callNumberInput.disabled = false;
            callManualBtn.disabled = false;
            callNumberInput.style.opacity = '1';
            callManualBtn.style.opacity = '1';
            if (batchCallCountInput) {
              batchCallCountInput.disabled = false;
              batchCallCountInput.style.opacity = '1';
            }
            if (batchCallBtn) {
              batchCallBtn.disabled = false;
              batchCallBtn.style.opacity = '1';
            }
          } else {
            queueStatusElement.textContent = '正常';
            queueStatusElement.style.color = '#52c41a';
            pauseBtn.textContent = '暂停排队';
            pauseBtn.className = 'btn btn-warning';
            callNumberInput.disabled = false;
            callManualBtn.disabled = false;
            callNumberInput.style.opacity = '1';
            callManualBtn.style.opacity = '1';
            if (batchCallCountInput) {
              batchCallCountInput.disabled = false;
              batchCallCountInput.style.opacity = '1';
            }
            if (batchCallBtn) {
              batchCallBtn.disabled = false;
              batchCallBtn.style.opacity = '1';
            }
          }
          
          document.getElementById('status-card').style.display = 'block';
        } catch (error) {
          showMessage('error', '加载状态失败: ' + error.message);
        }
      }
      
      async function toggleQueuePause() {
        const activityId = document.getElementById('call-activity').value;
        if (!activityId) {
          showMessage('warning', '请选择活动');
          return;
        }
        
        const pauseBtn = document.getElementById('queue-pause-btn');
        const isPaused = pauseBtn.textContent === '继续排队';
        
        try {
          const response = await fetch(`${API_URL}/activities/${activityId}/queue-pause`, {
            method: 'PUT',
            headers: { 
              'Content-Type': 'application/json', 
              Authorization: localStorage.getItem('token') 
            },
            body: JSON.stringify({ paused: !isPaused })
          });
          
          if (response.ok) {
            if (isPaused) {
              showMessage('success', '已继续排队');
            } else {
              showMessage('success', '已暂停排队');
            }
            loadStatus();
            loadQueues();
          } else {
            const data = await response.json();
            showMessage('error', data.error || '操作失败');
          }
        } catch (error) {
          showMessage('error', '网络错误');
        }
      }
      
      let currentPage = 1;
      let totalPages = 1;
      let currentTab = 'waiting';
      /** 批量叫号：勾选「不再提醒」后，本页会话内跳过确认框；换活动、搜索筛选、切换等待/已叫号或离开本菜单后重置 */
      let batchCallSkipConfirm = false;
      function resetBatchCallConfirmSession() {
        batchCallSkipConfirm = false;
      }

      let queueMgmtSortBy = 'number';
      let queueMgmtSortOrder = 'asc';
      function refreshQueueMgmtSortTh() {
        const tbl = document.getElementById('queue-mgmt-table');
        if (!tbl) return;
        tbl.querySelectorAll('th.sortable-th').forEach((th) => {
          const col = th.getAttribute('data-sort');
          const span = th.querySelector('.qm-sort');
          if (span && col) span.innerHTML = sortArrowHtml(queueMgmtSortBy, queueMgmtSortOrder, col);
        });
      }
      
      function getSearchParams() {
        const bracelet = document.getElementById('search-bracelet').value || '';
        const number = document.getElementById('search-number').value || '';
        return { bracelet, number };
      }
      
      async function loadQueues(page = 1) {
        const activityId = document.getElementById('call-activity').value;
        if (!activityId) {
          document.getElementById('waiting-queues-body').innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">请选择活动</td></tr>';
          document.getElementById('queue-pagination').style.display = 'block';
          document.getElementById('queue-page-info').textContent = '第 1 页 / 共 1 页';
          const qj0 = document.getElementById('queue-page-jump');
          if (qj0) qj0.value = '1';
          document.getElementById('queue-prev-page').disabled = true;
          document.getElementById('queue-next-page').disabled = true;
          return;
        }
        
        const { bracelet, number } = getSearchParams();
        
        try {
          let url = `${API_URL}/queues?activityId=${activityId}&page=1&pageSize=10000`;
          if (bracelet) url += `&bracelet=${encodeURIComponent(bracelet)}`;
          if (number) url += `&number=${encodeURIComponent(number)}`;
          
          const response = await fetch(url, {
            headers: { Authorization: localStorage.getItem('token') }
          });
          const data = await response.json();
          let queues = data.data || [];
          
          if (currentTab === 'waiting') {
            queues = queues.filter(q => q.status === 'waiting' || q.status === 'claimed');
          } else {
            queues = queues.filter(q => q.status === 'called');
          }
          
          queues.sort((a, b) => compareAdminQueueRowsClient(a, b, queueMgmtSortBy, queueMgmtSortOrder));
          
          const total = queues.length;
          const pageSizeLocal = 10;
          totalPages = Math.max(1, Math.ceil(total / pageSizeLocal));
          const clampedPage = Math.min(Math.max(1, page), totalPages);
          currentPage = clampedPage;
          const paginatedQueues = queues.slice((clampedPage - 1) * pageSizeLocal, clampedPage * pageSizeLocal);
          queues = paginatedQueues;
          
          const tbody = document.getElementById('waiting-queues-body');
          const operationTh = document.getElementById('operation-th');
          
          if (currentTab === 'waiting') {
            operationTh.style.display = 'table-cell';
            tbody.innerHTML = queues.map(queue => {
              const st = queueBindStatusDisplay(queue.status);
              return `
                <tr>
                  <td>${queue.手环编号}</td>
                  <td>${queue.号码}</td>
                  <td><span class="tag ${st.cls}">${st.text}</span></td>
                  <td>${queue.createdAt ? new Date(queue.createdAt).toLocaleString() : '-'}</td>
                  <td>-</td>
                  <td>
                    <button class="btn btn-primary btn-sm call-btn" data-number="${queue.号码}" data-activity="${activityId}">叫号</button>
                  </td>
                </tr>
              `;
            }).join('');
          } else {
            operationTh.style.display = 'none';
            tbody.innerHTML = queues.map(queue => {
              const st = queueBindStatusDisplay(queue.status);
              return `
                <tr>
                  <td>${queue.手环编号}</td>
                  <td>${queue.号码}</td>
                  <td><span class="tag ${st.cls}">${st.text}</span></td>
                  <td>${queue.createdAt ? new Date(queue.createdAt).toLocaleString() : '-'}</td>
                  <td>${queue.calledAt ? new Date(queue.calledAt).toLocaleString() : '-'}</td>
                  <td></td>
                </tr>
              `;
            }).join('');
          }
          
          if (queues.length === 0) {
            const msg = currentTab === 'waiting' ? '暂无等待叫号记录' : '暂无已叫号记录';
            tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: #999;">${msg}</td></tr>`;
          }
          
          document.getElementById('queue-page-info').textContent = `第 ${currentPage} 页 / 共 ${totalPages} 页`;
          const qJump = document.getElementById('queue-page-jump');
          if (qJump) qJump.value = String(currentPage);
          document.getElementById('queue-pagination').style.display = 'block';
          document.getElementById('queue-prev-page').disabled = currentPage <= 1;
          document.getElementById('queue-next-page').disabled = currentPage >= totalPages;
          refreshQueueMgmtSortTh();
          
          document.querySelectorAll('.call-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
              const number = e.target.dataset.number;
              const actId = e.target.dataset.activity;
              await doCall(actId, number);
            });
          });
        } catch (error) {
          showMessage('error', '加载排队记录失败');
        }
      }
      
      async function postQueueCall(activityId, number) {
        return fetch(`${API_URL}/queue/call`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: localStorage.getItem('token')
          },
          body: JSON.stringify({ activityId, number })
        });
      }

      async function doCall(activityId, number) {
        try {
          const response = await postQueueCall(activityId, number);
          
          if (response.ok) {
            showMessage('success', `已叫号: ${number}`);
            loadQueues(currentPage);
            loadStatus();
          } else {
            const data = await response.json();
            showMessage('error', data.error || '叫号失败');
          }
        } catch (error) {
          showMessage('error', '网络错误');
        }
      }
      
      async function callNext() {
        const activityId = document.getElementById('call-activity').value;
        if (!activityId) {
          showMessage('warning', '请选择活动');
          return;
        }
        
        const currentNumber = parseInt(document.getElementById('current-number').textContent);
        const nextNumber = currentNumber + 1;
        
        try {
          const response = await fetch(`${API_URL}/queue/call`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: localStorage.getItem('token') },
            body: JSON.stringify({ activityId, number: nextNumber })
          });
          
          if (response.ok) {
            showMessage('success', `已叫号入场: ${nextNumber}`);
            loadStatus();
            loadQueues();
          } else {
            const data = await response.json();
            showMessage('error', data.error || '叫号失败');
          }
        } catch (error) {
          showMessage('error', '网络错误');
        }
      }
      
      async function callManual() {
        const activityId = document.getElementById('call-activity').value;
        const number = document.getElementById('call-number').value;
        
        if (!activityId || !number) {
          showMessage('warning', '请输入叫号号码');
          return;
        }
        
        try {
          const response = await postQueueCall(activityId, parseInt(number, 10));
          
          if (response.ok) {
            showMessage('success', `已叫号入场: ${number}`);
            document.getElementById('call-number').value = '';
            loadStatus();
            loadQueues();
          } else {
            const data = await response.json();
            showMessage('error', data.error || '叫号失败');
          }
        } catch (error) {
          showMessage('error', '网络错误');
        }
      }

      const BATCH_CALL_MAX = 100;

      async function fetchAllWaitingQueuesSorted(activityId) {
        const url = `${API_URL}/queues?activityId=${encodeURIComponent(activityId)}&page=1&pageSize=20000`;
        const response = await fetch(url, {
          headers: { Authorization: localStorage.getItem('token') }
        });
        const data = await response.json();
        let list = data.data || [];
        list = list.filter((q) => q.status === 'waiting' || q.status === 'claimed');
        list.sort(compareQueueNumberAscAdmin);
        return list;
      }

      function batchCallPrompt() {
        const activityId = document.getElementById('call-activity').value;
        const raw = document.getElementById('batch-call-count').value;
        const n = parseInt(String(raw).trim(), 10);
        const rawInput = String(raw).trim();

        if (!activityId) {
          showMessage('warning', '请先选择活动');
          return;
        }
        if (!Number.isFinite(n) || n < 1) {
          showMessage('warning', '请输入批量数量（至少 1）');
          return;
        }
        if (n > BATCH_CALL_MAX) {
          showMessage('warning', `单次批量叫号最多 ${BATCH_CALL_MAX} 条`);
          return;
        }

        fetchAllWaitingQueuesSorted(activityId)
          .then((sorted) => {
            if (sorted.length === 0) {
              showMessage('warning', '当前没有等待叫号的记录');
              return;
            }
            const toCall = sorted.slice(0, n);
            const run = () => runBatchCalls(activityId, toCall, rawInput);

            if (batchCallSkipConfirm) {
              run();
              return;
            }

            const nums = toCall.map((q) => q.号码 ?? q.number).join('、');
            confirm({
              title: '确认批量叫号',
              content:
                `<p>将按排号顺序依次叫号 <strong>${toCall.length}</strong> 条（共请求 ${n} 条，实际可叫 ${toCall.length} 条）：</p>` +
                `<p style="word-break:break-all;color:#333;">${nums}</p>` +
                `<p style="color:#888;font-size:13px;">确认后依次提交，中途失败会停止并提示。</p>` +
                `<label style="display:flex;align-items:flex-start;gap:8px;margin-top:14px;font-size:13px;color:#555;cursor:pointer;user-select:none;">` +
                `<input type="checkbox" id="batch-call-dont-remind" style="margin-top:2px;flex-shrink:0;" />` +
                `<span>不再提醒（本页内下次批量叫号直接执行；离开侧栏菜单、更换活动或点击搜索/切换等待与已叫号后恢复确认）</span>` +
                `</label>`,
              onOk: () => {
                const el = document.getElementById('batch-call-dont-remind');
                if (el && el.checked) {
                  batchCallSkipConfirm = true;
                }
                run();
              }
            });
          })
          .catch(() => {
            showMessage('error', '加载等待队列失败');
          });
      }

      async function runBatchCalls(activityId, queues, rawInput) {
        const batchCallBtn = document.getElementById('batch-call-btn');
        const countInput = document.getElementById('batch-call-count');
        if (batchCallBtn) batchCallBtn.disabled = true;
        try {
          for (let i = 0; i < queues.length; i++) {
            const q = queues[i];
            const num = q.号码 != null ? q.号码 : q.number;
            const response = await postQueueCall(activityId, num);
            if (!response.ok) {
              const data = await response.json().catch(() => ({}));
              showMessage('error', `批量叫号在第 ${i + 1} 条（排号 ${num}）失败：${data.error || response.statusText || '叫号失败'}`);
              await loadStatus();
              loadQueues(currentPage);
              if (batchCallSkipConfirm && rawInput && countInput) {
                countInput.value = rawInput;
              }
              return;
            }
          }
          const labels = queues.map((q) => q.号码 ?? q.number).join('、');
          showMessage('success', `已批量叫号 ${queues.length} 个：${labels}`);
          if (batchCallSkipConfirm && rawInput && countInput) {
            countInput.value = rawInput;
          } else if (countInput) {
            countInput.value = '';
          }
          await loadStatus();
          loadQueues(1);
        } catch (e) {
          showMessage('error', '网络错误');
          if (batchCallSkipConfirm && rawInput && countInput) {
            countInput.value = rawInput;
          }
        } finally {
          if (batchCallBtn) batchCallBtn.disabled = false;
          loadStatus();
        }
      }
      
      document.getElementById('call-activity').addEventListener('change', () => {
        resetBatchCallConfirmSession();
        currentPage = 1;
        loadStatus();
        loadQueues(1);
      });
      
      document.getElementById('call-manual-btn').addEventListener('click', callManual);
      document.getElementById('batch-call-btn').addEventListener('click', batchCallPrompt);
      document.getElementById('queue-pause-btn').addEventListener('click', toggleQueuePause);
      
      document.getElementById('queue-prev-page').addEventListener('click', () => {
        if (currentPage > 1) {
          loadQueues(currentPage - 1);
        }
      });
      
      document.getElementById('queue-next-page').addEventListener('click', () => {
        if (currentPage < totalPages) {
          loadQueues(currentPage + 1);
        }
      });

      const queueJumpBtn = document.getElementById('queue-page-jump-btn');
      const queueJumpInp = document.getElementById('queue-page-jump');
      if (queueJumpBtn && queueJumpInp) {
        const goQueuePage = () => {
          const p = parseInt(String(queueJumpInp.value || '').trim(), 10);
          if (!Number.isFinite(p) || p < 1) {
            showMessage('warning', '请输入有效页码');
            return;
          }
          const max = Math.max(1, totalPages);
          const target = Math.min(max, p);
          if (target !== p) showMessage('info', `页码已限制在 1～${max}`);
          loadQueues(target);
        };
        queueJumpBtn.addEventListener('click', goQueuePage);
        queueJumpInp.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') goQueuePage();
        });
      }

      document.getElementById('queue-mgmt-table').addEventListener('click', (ev) => {
        const th = ev.target.closest('th.sortable-th');
        if (!th) return;
        const col = th.getAttribute('data-sort');
        if (!col) return;
        if (queueMgmtSortBy === col) {
          queueMgmtSortOrder = queueMgmtSortOrder === 'asc' ? 'desc' : 'asc';
        } else {
          queueMgmtSortBy = col;
          queueMgmtSortOrder = col === 'createdAt' || col === 'calledAt' ? 'desc' : 'asc';
        }
        loadQueues(currentPage);
      });
      
      document.getElementById('tab-waiting').addEventListener('click', () => {
        resetBatchCallConfirmSession();
        queueMgmtSortBy = 'number';
        queueMgmtSortOrder = 'asc';
        currentTab = 'waiting';
        currentPage = 1;
        document.getElementById('tab-waiting').style.background = '#1890ff';
        document.getElementById('tab-waiting').style.color = 'white';
        document.getElementById('tab-called').style.background = 'transparent';
        document.getElementById('tab-called').style.color = '#666';
        loadQueues(1);
        refreshQueueMgmtSortTh();
      });
      
      document.getElementById('tab-called').addEventListener('click', () => {
        resetBatchCallConfirmSession();
        queueMgmtSortBy = 'calledAt';
        queueMgmtSortOrder = 'desc';
        currentTab = 'called';
        currentPage = 1;
        document.getElementById('tab-called').style.background = '#1890ff';
        document.getElementById('tab-called').style.color = 'white';
        document.getElementById('tab-waiting').style.background = 'transparent';
        document.getElementById('tab-waiting').style.color = '#666';
        loadQueues(1);
        refreshQueueMgmtSortTh();
      });
      
      document.getElementById('search-btn').addEventListener('click', () => {
        resetBatchCallConfirmSession();
        currentPage = 1;
        loadQueues(1);
      });
      
      document.getElementById('search-bracelet').addEventListener('keyup', (e) => {
        if (e.key === 'Enter') {
          resetBatchCallConfirmSession();
          currentPage = 1;
          loadQueues(1);
        }
      });
      
      document.getElementById('search-number').addEventListener('keyup', (e) => {
        if (e.key === 'Enter') {
          resetBatchCallConfirmSession();
          currentPage = 1;
          loadQueues(1);
        }
      });
      
      loadActivities();
    }

      function renderUsers(users) {

      document.getElementById('add-user-btn').addEventListener('click', () => {
        createModal({
          title: '添加用户',

      let currentPage = 1;
      let totalPages = 1;
      let roleSortBy = '_id';

      let permissionKeyToLabel = {};

      async function refreshPermissionLabelMap() {
        try {
          const response = await fetch(`${API_URL}/permissions`, {
            headers: { Authorization: localStorage.getItem('token') }
          });
          const list = await response.json();
          permissionKeyToLabel = {};
          if (Array.isArray(list)) {
            list.forEach((p) => {
              if (p && p.key) permissionKeyToLabel[p.key] = p.name || p.key;
            });
          }
        } catch (e) {
          permissionKeyToLabel = {};
        }
      }

      function formatRolePermissionsDisplay(keys) {
        if (!Array.isArray(keys) || !keys.length) return '—';
        return keys
          .map((k) => permissionKeyToLabel[k] || k)
          .map((t) => escapeHtml(t))
          .join('、');
      }

      async function loadRoles(page = 1) {
        try {
          await refreshPermissionLabelMap();
          const qs = new URLSearchParams();
          qs.set('page', String(page));
          qs.set('pageSize', '10');
          qs.set('sortBy', roleSortBy);
          qs.set('sortOrder', roleSortOrder);
          const response = await fetch(`${API_URL}/roles?${qs}`, {
            headers: { Authorization: localStorage.getItem('token') }
          });
          const data = await response.json();
          const roles = data.data || [];
          const ps = Number(data.pageSize) || 10;
          currentPage = Number(data.page) || page || 1;
          totalPages = safeTotalPages(data.total, ps, data.totalPages);
          renderRoles(roles);
          updateRolesPagination();
          refreshAdminTableSortArrows('roles-admin-table', roleSortBy, roleSortOrder);
        } catch (error) {
          showMessage('error', '加载角色失败');
        }
      }

      function renderRoles(roles) {
        const tbody = document.getElementById('roles-table-body');
        if (!roles || roles.length === 0) {
          tbody.innerHTML =
            '<tr><td colspan="5" style="text-align: center; color: #999;">暂无数据</td></tr>';
          return;
        }
        tbody.innerHTML = roles
          .map((role) => {
            const perms = Array.isArray(role.permissions) ? role.permissions : [];
            const permText = formatRolePermissionsDisplay(perms);
            const isAdminRole =
              String(role.name || '').trim() === '管理员' || String(role._id) === '1';
            const delBtn = isAdminRole

                JSON.stringify(String(role._id)) +
                ')">删除</button>';
            const createdCell =
              role.createdAt != null && role.createdAt !== ''
                ? escapeHtml(new Date(role.createdAt).toLocaleString())
                : '—';

              '<tr>' +
              '<td>' +
              escapeHtml(String(role._id)) +

              '<td>' +

      if (rolesJumpBtn && rolesJumpInp) {

          }

          loadRoles(target);

      document.getElementById('roles-admin-table').addEventListener('click', (ev) => {

        if (!th) return;
        const col = th.getAttribute('data-sort');
        if (!col) return;
        if (roleSortBy === col) {
          roleSortOrder = roleSortOrder === 'asc' ? 'desc' : 'asc';
        } else {

          roleSortOrder = col === 'createdAt' ? 'desc' : 'asc';
        }
        loadRoles(1);

      function renderWechatUsers(users) {
        const tbody = document.getElementById('wechat-users-table-body');
        tbody.innerHTML = users.map(user => `
          <tr>
            <td>
              ${user.avatarUrl ? `<img src="${user.avatarUrl.startsWith('http') ? user.avatarUrl : window.location.origin + user.avatarUrl}" style="width: 40px; height: 40px; border-radius: 50%;" />` : '<span style="width: 40px; height: 40px; display: inline-block; background: #f5f5f5; border-radius: 50%; text-align: center; line-height: 40px;">👤</span>'}
            </td>
            <td>${user.nickName || '未设置'}</td>
            <td title="${user.openid}" style="max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${user.openid}</td>
            <td title="${user.unionid || ''}" style="max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${user.unionid || '-'}</td>
            <td>${user.createdAt ? new Date(user.createdAt).toLocaleString() : '-'}</td>
            <td>${(user.lastRequestAt || user.lastLoginAt) ? new Date(user.lastRequestAt || user.lastLoginAt).toLocaleString() : '-'}</td>
            <td>${user.activityCount || 0}</td>
            <td>${user.bindingCount || 0}</td>

            <td>

              <button class="btn ${user.isStaff ? 'btn-warning' : 'btn-success'} btn-small" onclick="toggleStaff('${user.openid}', ${user.isStaff})">${user.isStaff ? '取消员工' : '设为员工'}</button>

          </tr>

        if (users.length === 0) {
          tbody.innerHTML = '<tr><td colspan="10" style="text-align: center; color: #999;">暂无数据</td></tr>';
        }
      }
      
      function renderPagination() {
        const container = document.getElementById('wechat-pagination-container');
        const totalPages = safeTotalPages(pagination.total, pagination.pageSize);
        const cur = Math.min(Math.max(1, pagination.current), totalPages);
        if (cur !== pagination.current) pagination.current = cur;

        const html =
          '<div class="pagination-bar" style="border-top:none;margin-top:0;padding-top:0;">' +
          '<button type="button" class="btn btn-default btn-small"' +
          (pagination.current <= 1 ? ' disabled' : '') +
          ' data-action="prev">上一页</button>' +
          '<span style="min-width:130px;text-align:center;color:#666;font-size:14px;">第 ' +
          pagination.current +
          ' 页 / 共 ' +
          totalPages +
          ' 页</span>' +
          '<span class="pagination-jump">' +
          '<span>跳转</span>' +
          '<input type="number" id="wechat-page-jump" min="1" step="1" placeholder="页码" value="' +
          pagination.current +
          '" />' +
          '<button type="button" class="btn btn-default btn-small" id="wechat-page-jump-btn">确定</button></span>' +
          '<button type="button" class="btn btn-default btn-small"' +
          (pagination.current >= totalPages ? ' disabled' : '') +
          ' data-action="next">下一页</button>' +
          '</div>';

        container.innerHTML = html;

        container.querySelector('[data-action="prev"]').addEventListener('click', () => {
          if (pagination.current > 1) {
            pagination.current--;
            loadWechatUsers();
          }
        });
        container.querySelector('[data-action="next"]').addEventListener('click', () => {
          if (pagination.current < totalPages) {
            pagination.current++;
            loadWechatUsers();
          }
        });
        const wj = document.getElementById('wechat-page-jump-btn');
        const wi = document.getElementById('wechat-page-jump');
        if (wj && wi) {
          const go = () => {
            const p = parseInt(String(wi.value || '').trim(), 10);
            if (!Number.isFinite(p) || p < 1) {
              showMessage('warning', '请输入有效页码');
              return;
            }
            const max = totalPages;
            const target = Math.min(max, p);
            if (target !== p) showMessage('info', '页码已限制在 1～' + max);
            pagination.current = target;
            loadWechatUsers();
          };
          wj.addEventListener('click', go);
          wi.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') go();
          });
        }
      }
      
      async function loadWechatUsers() {
        const filters = {
          nickname: document.getElementById('wechat-filter-nickname').value,
          openid: document.getElementById('wechat-filter-openid').value,
          page: pagination.current,
          pageSize: pagination.pageSize,
          sortBy: wechatSortBy,
          sortOrder: wechatSortOrder
        };
        
        const params = new URLSearchParams(filters);
        try {
          const response = await fetch(`${API_URL}/wechat/users?${params}`, {
            headers: { Authorization: 'Bearer ' + localStorage.getItem('token') }
          });
          
          if (!response.ok) {
            showMessage('error', '请求失败，状态码: ' + response.status);
            return;
          }
          
          const data = await response.json();
          
          if (data.success) {
            renderWechatUsers(data.data || []);
            pagination.total = data.total || 0;
            renderPagination();
            refreshAdminTableSortArrows('wechat-users-admin-table', wechatSortBy, wechatSortOrder);
          } else {
            showMessage('error', data.error || '加载失败');
          }
        } catch (error) {
          showMessage('error', '加载微信用户失败: ' + error.message);
        }

      function viewWechatUserActivities(openid) {
        fetch(`${API_URL}/wechat/user/${openid}/activities`, {
          headers: { Authorization: localStorage.getItem('token') }
        })
        .then(response => {
          if (!response.ok) {
            throw new Error('请求失败');
          }
          return response.json();
        })
        .then(data => {
          const asCustomer = Array.isArray(data.asCustomer) ? data.asCustomer : [];
          const asStaff = Array.isArray(data.asStaff) ? data.asStaff : [];
          const legacy = Array.isArray(data.activities) ? data.activities : [];

              return `<p style="text-align:center;color:#999;padding:16px 8px;">${emptyText}</p>`;
            }
            const timeTh =
              timeKind === 'staff'
                ? '手环登记时间'
                : timeKind === 'customer'
                  ? '用户扫码绑定时间'
                  : '手环登记时间';
            function timeCell(act) {
              if (timeKind === 'staff') {
                return act.staffRegisteredAt ? new Date(act.staffRegisteredAt).toLocaleString() : '-';

              if (timeKind === 'customer') {
                if (act.userScanBoundAt) return new Date(act.userScanBoundAt).toLocaleString();
                if (act.status === 'waiting') return '未扫码';
                return '—';
              }
              return act.boundAt ? new Date(act.boundAt).toLocaleString() : '-';

            return `
            <table class="table" style="margin-bottom: 0;">
              <thead>
                <tr><th>活动ID</th><th>活动名称</th><th>手环编号</th><th>排号</th><th>状态</th><th>${timeTh}</th></tr>
              </thead>
              <tbody>
                ${rows.map((act) => {
                  const st = queueBindStatusDisplay(act.status);
                  return `<tr>
                  <td>${act.activityId}</td>
                  <td>${act.activityName}</td>
                  <td>${act.braceletId}</td>

      async function exportBraceletBatchCsv(batchId) {
        const token = localStorage.getItem('token');
        try {
          const response = await fetch(`${API_URL}/admin/bracelet-batches/${batchId}`, {
            headers: { Authorization: token }
          });
          const data = await parseApiJsonResponse(response);
          if (!response.ok) {
            showMessage('error', data.error || '导出失败（HTTP ' + response.status + '）');
            return;
          }
          const ids = Array.isArray(data.braceletIds) ? data.braceletIds : [];
          const qnums = Array.isArray(data.queueNumbers) ? data.queueNumbers : [];
          const hasNums = qnums.length > 0 && qnums.length === ids.length;
          const lines = hasNums ? ['序号,手环编号,排号'] : ['序号,手环编号'];
          ids.forEach((id, i) => {
            if (hasNums) {
              lines.push((i + 1) + ',' + String(id) + ',' + String(qnums[i] != null ? qnums[i] : ''));
            } else {
              lines.push((i + 1) + ',' + String(id));
            }
          });
          const csv = '\uFEFF' + lines.join('\r\n');
          const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = '手环制作_' + batchId + '.csv';
          a.click();
          URL.revokeObjectURL(a.href);
          showMessage('success', hasNums ? '已导出 CSV（序号、手环编号、排号）' : '已导出 CSV（序号、手环编号）');
        } catch (e) {
          var exMsg = e && e.message ? e.message : '导出失败';
          if (e && e.name === 'TypeError' && /fetch|Failed to fetch|NetworkError/i.test(String(e.message))) {
            exMsg = '无法连接后端，请确认服务已启动。';
          }
          showMessage('error', exMsg);
        }
      }

      async function loadBraceletBatchRows() {
        const tbody = document.getElementById('bracelet-batches-table-body');
        const token = localStorage.getItem('token');
        const page = braceletBatchPagination.current;
        const pageSize = braceletBatchPagination.pageSize;
        try {
          const response = await fetch(
            `${API_URL}/admin/bracelet-batches?page=${page}&pageSize=${pageSize}&sortBy=${encodeURIComponent(
              braceletBatchSortBy
            )}&sortOrder=${encodeURIComponent(braceletBatchSortOrder)}`,
            { headers: { Authorization: token } }
          );
          const data = await parseApiJsonResponse(response);
          if (!response.ok) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#ff4d4f;">' + escapeHtml(data.error || '加载失败（HTTP ' + response.status + '）') + '</td></tr>';
            renderBraceletBatchPagination();
            refreshAdminTableSortArrows('bracelet-batches-admin-table', braceletBatchSortBy, braceletBatchSortOrder);
            return;
          }
          braceletBatchPagination.total = typeof data.total === 'number' ? data.total : 0;
          braceletBatchPagination.totalPages =
            typeof data.totalPages === 'number' && data.totalPages >= 1 ? data.totalPages : 1;
          if (braceletBatchPagination.current > braceletBatchPagination.totalPages) {
            braceletBatchPagination.current = braceletBatchPagination.totalPages;
            await loadBraceletBatchRows();
            return;
          }
          const rows = Array.isArray(data.data) ? data.data : [];
          if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#999;">暂无记录，请先在上方页签中生成</td></tr>';
            renderBraceletBatchPagination();

            return;
          }
          tbody.innerHTML = rows.map((r) => {

          renderBraceletBatchPagination();
          refreshAdminTableSortArrows('bracelet-batches-admin-table', braceletBatchSortBy, braceletBatchSortOrder);
        } catch (e) {
          var errMsg = e && e.message ? e.message : '加载失败';
          if (e && e.name === 'TypeError' && /fetch|Failed to fetch|NetworkError/i.test(String(e.message))) {
            errMsg = '无法连接后端，请确认服务已启动且通过 ' + BASE_URL + ' 访问（勿用本地文件 file:// 打开页面）。';

          renderBraceletBatchPagination();

        }
      });
      document.getElementById('bracelet-batches-next').addEventListener('click', () => {
        if (braceletBatchPagination.current < braceletBatchPagination.totalPages) {
          braceletBatchPagination.current++;
          loadBraceletBatchRows();
        }
      });

      const bbJumpBtn = document.getElementById('bracelet-batches-page-jump-btn');
      const bbJumpInp = document.getElementById('bracelet-batches-page-jump');
      if (bbJumpBtn && bbJumpInp) {
        const goBb = () => {
          const p = parseInt(String(bbJumpInp.value || '').trim(), 10);
          if (!Number.isFinite(p) || p < 1) {
            showMessage('warning', '请输入有效页码');
            return;
          }
          const max = Math.max(1, braceletBatchPagination.totalPages || 1);
          const target = Math.min(max, p);
          if (target !== p) showMessage('info', '页码已限制在 1～' + max);
          braceletBatchPagination.current = target;
          loadBraceletBatchRows();
        };
        bbJumpBtn.addEventListener('click', goBb);
        bbJumpInp.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') goBb();
        });
      }

      loadBraceletBatchRows();
    }
    
    // Main Layout
    let currentUser = null;
    
    function renderMainLayout(user) {
      currentUser = user;
      const html = `
        <div class="layout">
          <div class="layout-header">
            <div class="layout-header-title">漫展排队系统</div>
            <div class="layout-header-right">
              <span>欢迎, ${user.username}</span>
              <button class="btn btn-default" onclick="logout()">退出登录</button>
            </div>
          </div>
          <div class="layout-body">
            <div class="layout-sider">
              <ul class="menu">
                <li class="menu-item active" id="menu-activity"><span>活动管理</span></li>
                ${user.role === 'admin' || (Array.isArray(user.permissions) && user.permissions.includes('activity.manage'))
                  ? '<li class="menu-item" id="menu-bracelet-make"><span>制作手环</span></li>'
                  : ''}
                <li class="menu-item" id="menu-bind"><span>登记手环</span></li>
                <li class="menu-item" id="menu-wechat"><span>微信用户</span></li>
                <li class="menu-item" id="menu-queue"><span>叫号管理</span></li>
                <li class="menu-item" id="menu-roles"><span>角色管理</span></li>
                <li class="menu-item" id="menu-users"><span>用户管理</span></li>
              </ul>
            </div>
            <div class="layout-content" id="main-content"></div>
          </div>
        </div>
      `;
      document.getElementById('app').innerHTML = html;
      
      function setActiveMenu(key) {
        document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
        document.getElementById(`menu-${key}`).classList.add('active');
      }
      
      document.getElementById('menu-activity').addEventListener('click', () => {
        setActiveMenu('activity');
        renderActivityManagement();
      });

      const menuBraceletMake = document.getElementById('menu-bracelet-make');
      if (menuBraceletMake) {
        menuBraceletMake.addEventListener('click', () => {
          setActiveMenu('bracelet-make');
          renderBraceletMakePage();
        });
      }
      
      document.getElementById('menu-bind').addEventListener('click', () => {
        setActiveMenu('bind');
        renderBindManagement();
      });

      document.getElementById('menu-wechat').addEventListener('click', () => {
        setActiveMenu('wechat');
        renderWechatUserManagement();
      });
      
      document.getElementById('menu-queue').addEventListener('click', () => {
        setActiveMenu('queue');
        renderQueueManagement();
      });
      
      document.getElementById('menu-roles').addEventListener('click', () => {
        setActiveMenu('roles');
        renderRoleManagement();
      });
      
      document.getElementById('menu-users').addEventListener('click', () => {
        setActiveMenu('users');
        renderUserManagement();
      });
      
      renderActivityManagement();
    }
    
    // Logout
    window.logout = function() {
      localStorage.removeItem('token');
      showMessage('success', '退出成功');
      initApp();
    };
    
    // Initialize App
    async function initApp() {
      const token = localStorage.getItem('token');
      
      if (token) {
        try {
          const response = await fetch(`${API_URL}/auth/current`, {
            headers: { Authorization: token }
          });
          const data = await response.json();
          
          if (data.user) {
            renderMainLayout(data.user);
            return;
          }
        } catch (error) {
          // Token expired or invalid
        }
      }
      
      renderLoginPage(renderMainLayout);
    }
    
    initApp();
  </script>
</body>
</html>
