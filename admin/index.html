    // Role Management
    function renderRoleManagement() {
      const html = `
        <div class="card">
          <div class="card-header">
            <span class="card-title">角色管理</span>
            <button id="add-role-btn" class="btn btn-primary">+ 添加角色</button>
          </div>
          <table class="table">
            <thead>
              <tr>
                <th>ID</th>
                <th>角色名称</th>
                <th>权限列表</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="roles-table-body"></tbody>
          </table>
          <div id="roles-pagination" style="margin-top: 20px; padding-top: 16px; border-top: 1px solid #eee; text-align: center;">
            <button id="roles-prev-page" class="btn btn-default btn-small" disabled>上一页</button>
            <span id="roles-page-info" style="margin: 0 20px; color: #666; font-size: 14px;">第 1 页 / 共 1 页</span>
            <button id="roles-next-page" class="btn btn-default btn-small" disabled>下一页</button>
          </div>
        </div>
      `;
      document.getElementById('main-content').innerHTML = html;
      
      let currentPage = 1;
      let totalPages = 1;
      
      async function loadRoles(page = 1) {
        try {
          const response = await fetch(`${API_URL}/roles?page=${page}&pageSize=10`, {
            headers: { Authorization: localStorage.getItem('token') }
          });
          const data = await response.json();
          const roles = data.data || [];
          currentPage = data.page || 1;
          totalPages = data.totalPages || 1;
          renderRoles(roles);
          updateRolesPagination();
        } catch (error) {
          showMessage('error', '加载角色失败');
        }
      }
      
      function renderRoles(roles) {
        const tbody = document.getElementById('roles-table-body');
        tbody.innerHTML = roles.map(role => `
          <tr>
            <td>${role._id}</td>
            <td>${role.name}</td>
            <td>${role.permissions.join(', ')}</td>
            <td><button class="btn btn-danger btn-small" onclick="deleteRole('${role._id}')">删除</button></td>
          </tr>
        `).join('');
        
        if (roles.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #999;">暂无数据</td></tr>';
        }
      }
      
      function updateRolesPagination() {
        document.getElementById('roles-page-info').textContent = `第 ${currentPage} 页 / 共 ${totalPages} 页`;
        document.getElementById('roles-prev-page').disabled = currentPage <= 1;
        document.getElementById('roles-next-page').disabled = currentPage >= totalPages;
      }
      
      function deleteRole(id) {
        confirm({
          title: '确认删除',
          content: '确定要删除这个角色吗？',
          onOk: async () => {
            try {
              const response = await fetch(`${API_URL}/roles/${id}`, {
                method: 'DELETE',
                headers: { Authorization: localStorage.getItem('token') }
              });
              
              if (response.ok) {
                showMessage('success', '删除成功');
                loadRoles();
              } else {
                showMessage('error', '删除失败');
              }
            } catch (error) {
              showMessage('error', '网络错误');
            }
          }
        });
      }
      
      document.getElementById('add-role-btn').addEventListener('click', () => {
        createModal({
          title: '添加角色',
          body: `
            <div class="form-group">
              <label>角色名称</label>
              <input type="text" id="add-role-name" class="form-control" placeholder="请输入角色名称" />
            </div>
            <div class="form-group">
              <label>权限列表（逗号分隔）</label>
              <input type="text" id="add-role-permissions" class="form-control" placeholder="如：admin, activity.manage" />
            </div>
          `,
          footer: `
            <button class="btn btn-default" onclick="this.closest('.modal-overlay').remove()">取消</button>
            <button class="btn btn-primary" onclick="submitAddRole()">确定</button>
          `
        });
      });
      
      window.submitAddRole = async () => {
        const name = document.getElementById('add-role-name').value;
        const permissions = document.getElementById('add-role-permissions').value.split(',').map(p => p.trim()).filter(p => p);
        
        if (!name) {
          showMessage('warning', '请输入角色名称');
          return;
        }
        
        try {
          const response = await fetch(`${API_URL}/roles`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: localStorage.getItem('token') },
            body: JSON.stringify({ name, permissions })
          });
          
          if (response.ok) {
            showMessage('success', '创建成功');
            document.querySelector('.modal-overlay').remove();
            loadRoles();
          } else {
            showMessage('error', '创建失败');
          }
        } catch (error) {
          showMessage('error', '网络错误');
        }
      };
      
      window.deleteRole = deleteRole;
      
      document.getElementById('roles-prev-page').addEventListener('click', () => {
        if (currentPage > 1) {
          loadRoles(currentPage - 1);
        }
      });
      
      document.getElementById('roles-next-page').addEventListener('click', () => {
        if (currentPage < totalPages) {
          loadRoles(currentPage + 1);
        }
      });
      
      loadRoles();
    }
    
    // WeChat User Management
    function renderWechatUserManagement() {
      const html = `
        <div class="card">
          <div class="form-inline">
            <div class="form-group">
              <label>昵称</label>
              <input type="text" id="wechat-filter-nickname" class="form-control" placeholder="请输入昵称" style="width: 200px;" />
            </div>
            <div class="form-group">
              <label>OpenID</label>
              <input type="text" id="wechat-filter-openid" class="form-control" placeholder="请输入OpenID" style="width: 250px;" />
            </div>
            <button id="wechat-filter-btn" class="btn btn-primary">查询</button>
            <button id="wechat-reset-btn" class="btn btn-default">重置</button>
          </div>
        </div>
        
        <div class="card">
          <div class="card-header">
            <span class="card-title">微信用户管理</span>
          </div>
          <table class="table">
            <thead>
              <tr>
                <th>头像</th>
                <th>昵称</th>
                <th>OpenID</th>
                <th>UnionID</th>
                <th>创建时间</th>
                <th>最后登录</th>
                <th>活动数量</th>
                <th>绑定数量</th>
                <th>员工状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="wechat-users-table-body"></tbody>
          </table>
          <div id="wechat-pagination-container" class="pagination"></div>
        </div>
      `;
      document.getElementById('main-content').innerHTML = html;
      
      let pagination = { current: 1, pageSize: 10, total: 0 };
      
      function renderWechatUsers(users) {
        const tbody = document.getElementById('wechat-users-table-body');
        tbody.innerHTML = users.map(user => `
          <tr>
            <td>
              ${user.avatarUrl ? `<img src="${user.avatarUrl.startsWith('http') ? user.avatarUrl : window.location.origin + user.avatarUrl}" style="width: 40px; height: 40px; border-radius: 50%;" />` : '<span style="width: 40px; height: 40px; display: inline-block; background: #f5f5f5; border-radius: 50%; text-align: center; line-height: 40px;">👤</span>'}
            </td>
            <td>${user.nickName || '未设置'}</td>
            <td title="${user.openid}" style="max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${user.openid}</td>
            <td title="${user.unionid || ''}" style="max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${user.unionid || '-'}</td>
            <td>${user.createdAt ? new Date(user.createdAt).toLocaleString() : '-'}</td>
            <td>${user.lastLoginAt ? new Date(user.lastLoginAt).toLocaleString() : '-'}</td>
            <td>${user.activityCount || 0}</td>
            <td>${user.bindingCount || 0}</td>
            <td>${user.isStaff ? '<span class="tag tag-green">是</span>' : '<span class="tag tag-gray">否</span>'}</td>
            <td>
              <button class="btn btn-default btn-small" onclick="viewWechatUserActivities('${user.openid}')">查看活动</button>
              <button class="btn ${user.isStaff ? 'btn-warning' : 'btn-success'} btn-small" onclick="toggleStaff('${user.openid}', ${user.isStaff})">${user.isStaff ? '取消员工' : '设为员工'}</button>
            </td>
          </tr>
        `).join('');
        
        if (users.length === 0) {
          tbody.innerHTML = '<tr><td colspan="10" style="text-align: center; color: #999;">暂无数据</td></tr>';
        }
      }
      
      function renderPagination() {
        const container = document.getElementById('wechat-pagination-container');
        const totalPages = Math.ceil(pagination.total / pagination.pageSize);
        
        if (totalPages <= 1) {
          container.innerHTML = '';
          return;
        }
        
        let html = `<button class="btn btn-default btn-small" ${pagination.current === 1 ? 'disabled' : ''} data-action="prev">上一页</button>`;
        for (let i = 1; i <= totalPages; i++) {
          html += `<button class="btn btn-default btn-small ${pagination.current === i ? 'active' : ''}" data-page="${i}">${i}</button>`;
        }
        html += `<button class="btn btn-default btn-small" ${pagination.current === totalPages ? 'disabled' : ''} data-action="next">下一页</button>`;
        
        container.innerHTML = html;
        
        container.querySelectorAll('button').forEach(btn => {
          btn.addEventListener('click', () => {
            if (btn.dataset.action === 'prev' && pagination.current > 1) {
              pagination.current--;
              loadWechatUsers();
            } else if (btn.dataset.action === 'next' && pagination.current < totalPages) {
              pagination.current++;
              loadWechatUsers();
            } else if (btn.dataset.page) {
              pagination.current = parseInt(btn.dataset.page);
              loadWechatUsers();
            }
          });
        });
      }
      
      async function loadWechatUsers() {
        const filters = {
          nickname: document.getElementById('wechat-filter-nickname').value,
          openid: document.getElementById('wechat-filter-openid').value,
          page: pagination.current,
          pageSize: pagination.pageSize
        };
        
        const params = new URLSearchParams(filters);
        try {
          const response = await fetch(`${API_URL}/wechat/users?${params}`, {
            headers: { Authorization: 'Bearer ' + localStorage.getItem('token') }
          });
          
          if (!response.ok) {
            showMessage('error', '请求失败，状态码: ' + response.status);
            return;
          }
          
          const data = await response.json();
          
          if (data.success) {
            renderWechatUsers(data.data || []);
            pagination.total = data.total || 0;
            renderPagination();
          } else {
            showMessage('error', data.error || '加载失败');
          }
        } catch (error) {
          showMessage('error', '加载微信用户失败: ' + error.message);
        }
      }
      
      function viewWechatUserActivities(openid) {
        fetch(`${API_URL}/wechat/user/${openid}/activities`, {
          headers: { Authorization: localStorage.getItem('token') }
        })
        .then(response => {
          if (!response.ok) {
            throw new Error('请求失败');
          }
          return response.json();
        })
        .then(data => {
          const asCustomer = Array.isArray(data.asCustomer) ? data.asCustomer : [];
          const asStaff = Array.isArray(data.asStaff) ? data.asStaff : [];
          const legacy = Array.isArray(data.activities) ? data.activities : [];

          function tableFromRows(rows, emptyText, timeKind) {
            if (!rows.length) {
              return `<p style="text-align:center;color:#999;padding:16px 8px;">${emptyText}</p>`;
            }
            const timeTh =
              timeKind === 'staff'
                ? '手环登记时间'
                : timeKind === 'customer'
                  ? '用户扫码绑定时间'
                  : '手环登记时间';
            function timeCell(act) {
              if (timeKind === 'staff') {
                return act.staffRegisteredAt ? new Date(act.staffRegisteredAt).toLocaleString() : '-';
              }
              if (timeKind === 'customer') {
                if (act.userScanBoundAt) return new Date(act.userScanBoundAt).toLocaleString();
                if (act.status === 'waiting') return '未扫码';
                return '—';
              }
              return act.boundAt ? new Date(act.boundAt).toLocaleString() : '-';
            }
            return `
            <table class="table" style="margin-bottom: 0;">
              <thead>
                <tr><th>活动ID</th><th>活动名称</th><th>手环编号</th><th>排号</th><th>状态</th><th>${timeTh}</th></tr>
              </thead>
              <tbody>
                ${rows.map((act) => {
                  const st = queueBindStatusDisplay(act.status);
                  return `<tr>
                  <td>${act.activityId}</td>
                  <td>${act.activityName}</td>
                  <td>${act.braceletId}</td>
                  <td>${act.number}</td>
                  <td><span class="tag ${st.cls}">${st.text}</span></td>
                  <td>${timeCell(act)}</td>
                </tr>`;
                }).join('')}
              </tbody>
            </table>`;
          }

          const hasSplitTabs = data.asCustomer !== undefined && data.asStaff !== undefined;
          const body = hasSplitTabs
              ? `
            <div class="wx-user-act-wrap">
              <div style="display:flex;gap:0;margin-bottom:12px;border-bottom:1px solid #f0f0f0;flex-wrap:wrap;">
                <button type="button" class="wx-user-act-tab btn btn-primary active" data-pane="cust" style="border-radius:4px 4px 0 0;margin-bottom:-1px;">作为用户 · 扫码领取手环</button>
                <button type="button" class="wx-user-act-tab btn btn-default" data-pane="staff" style="border-radius:4px 4px 0 0;margin-bottom:-1px;margin-left:8px;">作为员工 · 小程序绑定手环</button>
              </div>
              <div class="wx-user-act-pane" data-pane="cust">${tableFromRows(asCustomer, '暂无：该用户扫码领取绑定的手环记录', 'customer')}</div>
              <div class="wx-user-act-pane" data-pane="staff" style="display:none;">${tableFromRows(asStaff, '暂无：该用户在员工端绑定的手环记录', 'staff')}</div>
            </div>`
              : tableFromRows(legacy.length ? legacy : [...asCustomer, ...asStaff], '暂无活动记录', null);

          const modal = createModal({
            title: `用户 ${openid} 的手环记录`,
            body
          });
          const wrap = modal.querySelector('.wx-user-act-wrap');
          if (wrap) {
            wrap.querySelectorAll('.wx-user-act-tab').forEach((btn) => {
              btn.addEventListener('click', () => {
                const pane = btn.getAttribute('data-pane');
                wrap.querySelectorAll('.wx-user-act-tab').forEach((b) => {
                  b.classList.remove('active', 'btn-primary');
                  b.classList.add('btn-default');
                });
                btn.classList.add('active', 'btn-primary');
                btn.classList.remove('btn-default');
                wrap.querySelectorAll('.wx-user-act-pane').forEach((p) => {
                  p.style.display = p.getAttribute('data-pane') === pane ? '' : 'none';
                });
              });
            });
          }
        })
        .catch(error => showMessage('error', '加载失败: ' + error.message));
      }
      
      window.viewWechatUserActivities = viewWechatUserActivities;
      
      async function toggleStaff(openid, currentStatus) {
        const newStatus = !currentStatus;
        try {
          const response = await fetch(`${API_URL}/wechat/user/${openid}/staff`, {
            method: 'PUT',
            headers: { 
              Authorization: 'Bearer ' + localStorage.getItem('token'),
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ isStaff: newStatus })
          });
          
          if (!response.ok) {
            throw new Error('请求失败');
          }
          
          const data = await response.json();
          if (data.success) {
            showMessage('success', data.message);
            loadWechatUsers();
          } else {
            showMessage('error', data.error || '操作失败');
          }
        } catch (error) {
          showMessage('error', '操作失败: ' + error.message);
        }
      }
      
      window.toggleStaff = toggleStaff;
      
      // 绑定查询按钮事件
      const filterBtn = document.getElementById('wechat-filter-btn');
      if (filterBtn) {
        filterBtn.addEventListener('click', () => {
          pagination.current = 1;
          loadWechatUsers();
        });
      } else {
        console.error('未找到 wechat-filter-btn 元素');
      }
      
      // 绑定重置按钮事件
      const resetBtn = document.getElementById('wechat-reset-btn');
      if (resetBtn) {
        resetBtn.addEventListener('click', () => {
          document.getElementById('wechat-filter-nickname').value = '';
          document.getElementById('wechat-filter-openid').value = '';
          pagination.current = 1;
          loadWechatUsers();
        });
      } else {
        console.error('未找到 wechat-reset-btn 元素');
      }
      
      // 首次加载数据
      loadWechatUsers();
    }
    
    // Main Layout
    let currentUser = null;
    
    function renderMainLayout(user) {
      currentUser = user;
      const html = `
        <div class="layout">
          <div class="layout-header">
            <div class="layout-header-title">漫展排队系统</div>
            <div class="layout-header-right">
              <span>欢迎, ${user.username}</span>
              <button class="btn btn-default" onclick="logout()">退出登录</button>
            </div>
          </div>
          <div class="layout-body">
            <div class="layout-sider">
              <ul class="menu">
                <li class="menu-item active" id="menu-activity"><span>活动管理</span></li>
                <li class="menu-item" id="menu-bind"><span>登记手环</span></li>
                <li class="menu-item" id="menu-queue"><span>叫号管理</span></li>
                <li class="menu-item" id="menu-users"><span>用户管理</span></li>
                <li class="menu-item" id="menu-roles"><span>角色管理</span></li>
                <li class="menu-item" id="menu-wechat"><span>微信用户</span></li>
              </ul>
            </div>
            <div class="layout-content" id="main-content"></div>
          </div>
        </div>
      `;
      document.getElementById('app').innerHTML = html;
      
      function setActiveMenu(key) {
        document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
        document.getElementById(`menu-${key}`).classList.add('active');
      }
      
      document.getElementById('menu-activity').addEventListener('click', () => {
        setActiveMenu('activity');
        renderActivityManagement();
      });
      
      document.getElementById('menu-bind').addEventListener('click', () => {
        setActiveMenu('bind');
        renderBindManagement();
      });
      
      document.getElementById('menu-queue').addEventListener('click', () => {
        setActiveMenu('queue');
        renderQueueManagement();
      });
      
      document.getElementById('menu-users').addEventListener('click', () => {
        setActiveMenu('users');
        renderUserManagement();
      });
      
      document.getElementById('menu-roles').addEventListener('click', () => {
        setActiveMenu('roles');
        renderRoleManagement();
      });
      
      document.getElementById('menu-wechat').addEventListener('click', () => {
        setActiveMenu('wechat');
        renderWechatUserManagement();
      });
      
      renderActivityManagement();
    }
    
    // Logout
    window.logout = function() {
      localStorage.removeItem('token');
      showMessage('success', '退出成功');
      initApp();
    };
    
    // Initialize App
    async function initApp() {
      const token = localStorage.getItem('token');
      
      if (token) {
        try {
          const response = await fetch(`${API_URL}/auth/current`, {
            headers: { Authorization: token }
          });
          const data = await response.json();
          
          if (data.user) {
            renderMainLayout(data.user);
            return;
          }
        } catch (error) {
          // Token expired or invalid
        }
      }
      
      renderLoginPage(renderMainLayout);
    }
    
    initApp();
  </script>
</body>
</html>
